<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transactions</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>💰 Finance</h2>
    <ul>
      <li onclick="goTo('../index.html')">Dashboard</li>
      <li onclick="goTo('analytics.html')">Analytics</li>
      <li onclick="goTo('add-transaction.html')">Add</li>
      <li class="active">Transactions</li>
      <li onclick="goTo('reports.html')">Reports</li>
      <li onclick="goTo('profile.html')">Profile</li>
    </ul>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h1 class="page-title">📜 Transactions</h1>

    <!-- FILTERS -->
    <div class="filter-box">
      <input type="text" id="search" placeholder="Search...">
      <input type="date" id="filterDate">
      <input type="text" id="filterCategory" placeholder="Category">

      <button onclick="applyFilters()" class="toggle-btn">Filter</button>
    </div>

    <!-- TABLE -->
    <div class="table-box">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Amount</th>
            <th>Type</th>
            <th>Category</th>
            <th>Description</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody id="transactionTable"></tbody>
      </table>
    </div>

  </div>

</div>

<script src="../script.js"></script>
</body>
</html>
